[package]
name = "elephc"
version = "0.23.2"
edition = "2021"
description = "A PHP-to-native AOT compiler"
license = "MIT"
repository = "https://github.com/illegalstudio/elephc"
homepage = "https://github.com/illegalstudio/elephc"
readme = "README.md"
keywords = ["php", "compiler", "aot", "native", "codegen"]
categories = ["compilers", "command-line-utilities"]

[[bin]]
name = "elephc"
path = "src/main.rs"

[dependencies]
serde_json = "1"
# flate2 (default miniz_oxide backend = pure Rust, no system zlib) is used by the
# compiler to inflate raw-DEFLATE phar:// entries at compile time. Decompress-only.
flate2 = "1"
# bzip2-rs is a PURE-RUST bzip2 decoder (no system libbz2, no C toolchain) used by
# the compiler to decompress bzip2 phar:// entries at compile time. Decompress-only.
bzip2-rs = "0.1"

# elephc-tls is a runtime staticlib, not used by the Rust compiler itself —
# but the codegen test runner needs libelephc_tls.a to link the https://
# wrapper into test binaries, so it ships as a dev-dependency to make
# `cargo test` build it automatically.
[dev-dependencies]
elephc-tls = { path = "crates/elephc-tls" }
# flate2 lets the phar:// codegen tests build gzip (raw-DEFLATE) fixture entries
# with the same encoder the compiler decodes, guaranteeing a version-stable
# round-trip without shelling out to php.
flate2 = "1"

# Phase 4b: the elephc-tls staticlib carries the rustls-backed TLS surface
# for the https:// wrapper. It is a default workspace member so `cargo build`
# materializes libelephc_tls.a for normal dev builds and packaging.
[workspace]
members = [".", "crates/elephc-tls"]
default-members = [".", "crates/elephc-tls"]
resolver = "2"
