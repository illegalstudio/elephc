name: CI Image

# Builds and publishes the container image used by the Linux jobs in ci.yml
# (see .github/docker/ci.Dockerfile). Each architecture builds natively on its
# own runner (no QEMU), then a manifest job stitches the per-arch tags into
# the multi-arch :latest tag the CI jobs pull.
#
# Pull requests touching the image only build it (no push) to validate the
# Dockerfile; pushes to main and manual dispatches publish.

on:
  push:
    branches: [main]
    paths:
      - '.github/docker/ci.Dockerfile'
      - '.github/workflows/ci-image.yml'
  pull_request:
    paths:
      - '.github/docker/ci.Dockerfile'
      - '.github/workflows/ci-image.yml'
  workflow_dispatch:

# Serialize publishes so two close-together pushes cannot interleave their
# per-arch tags into a mixed manifest.
concurrency:
  group: ci-image
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}-ci

jobs:
  build:
    name: Build image (${{ matrix.arch }})
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (push on main)
        uses: docker/build-push-action@v6
        with:
          context: .github/docker
          file: .github/docker/ci.Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.IMAGE }}:${{ matrix.arch }}
          # Keep the per-arch tags as plain image manifests: provenance
          # attestations would wrap each tag in an OCI index and complicate
          # the manifest stitch below.
          provenance: false

  manifest:
    name: Publish multi-arch manifest
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push the multi-arch tags
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE}:latest" \
            --tag "${IMAGE}:sha-${GITHUB_SHA::7}" \
            "${IMAGE}:amd64" \
            "${IMAGE}:arm64"
