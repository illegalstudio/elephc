            --archive-file "$RUNNER_TEMP/nextest-archive.tar.zst" \
            --workspace-remap . \
            -E 'binary(codegen_tests) and test(~codegen::eval)' \
            --partition hash:${{ matrix.shard }}/16 \
            --no-fail-fast --retries 1 --flaky-result pass \
            -j 2

  image-api-sync:
    name: Image API stubs in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate image API stubs
        # Re-run the generator from its pinned spec; the committed prelude stubs and
        # coverage tests must come back byte-identical. A diff means someone edited
        # the prelude or api_spec.json without regenerating (see
        # crates/elephc-image/tools/README.md).
        run: python3 crates/elephc-image/tools/gen_image_api_stubs.py

      - name: Fail if regeneration changed tracked files
        run: git diff --exit-code -- src/image_prelude.rs tests/codegen/image/

      - name: Check extern/export symbol parity
        # Every `extern "elephc_image"` declaration in the prelude must have a
        # matching #[no_mangle] export in the staticlib, or compiled programs that
        # use the symbol fail to link.
        run: python3 crates/elephc-image/tools/check_extern_exports.py

  builtins-docs-sync:
    name: Builtins docs in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build state
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: rust-builtins-docs-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            rust-builtins-docs-

      - name: Build the builtin docs exporter
        # The docs generator reads the single-source `builtin!` registry plus the
        # eval interpreter's `eval_builtin!` registry via the `gen_builtins`
        # example (`extract.py` prefers the prebuilt binary at
        # target/debug/examples/gen_builtins), so it must be built first.
        run: cargo build --example gen_builtins

      - name: Regenerate builtins documentation
        # Re-run the generator; the committed Markdown pages and JSON registry
        # must come back byte-identical. A diff means someone changed a builtin
        # signature, lowering, or area assignment without regenerating docs.
        run: python3 scripts/docs/extract_builtins.py --render --force

      - name: Audit generated builtins docs
        run: python3 scripts/docs/audit_builtins.py

      - name: Validate generated docs for site compatibility
        run: python3 scripts/docs/elephc_builtins/validate_site_compat.py

      - name: Fail if generated docs are out of sync
        run: |
          changes=$(git status --porcelain -- docs/php/builtins.md docs/php/builtins docs/internals/builtins scripts/docs/builtin_registry.json)
          if [ -n "$changes" ]; then
            echo "Generated builtins docs are out of sync."
            echo "Run 'python3 scripts/docs/extract_builtins.py --render --force' and commit the result."
            echo "$changes"
            exit 1
          fi

  test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs:
      - build-archive-macos-aarch64
      - build-archive-linux-x86_64
      - build-archive-linux-aarch64
      - non-codegen-tests-macos-aarch64
      - non-codegen-tests-linux-x86_64
      - non-codegen-tests-linux-aarch64
      - web-tests-macos-aarch64
      - web-tests-linux-x86_64
      - web-tests-linux-aarch64
      - codegen-tests-macos-aarch64
      - codegen-tests-linux-x86_64
      - codegen-tests-linux-aarch64
      - image-api-sync
      - builtins-docs-sync
    if: always()
    steps:
      - name: Verify test jobs
        run: |
          test "${{ needs.build-archive-macos-aarch64.result }}" = "success"
          test "${{ needs.build-archive-linux-x86_64.result }}" = "success"
          test "${{ needs.build-archive-linux-aarch64.result }}" = "success"
          test "${{ needs.non-codegen-tests-macos-aarch64.result }}" = "success"
          test "${{ needs.non-codegen-tests-linux-x86_64.result }}" = "success"
          test "${{ needs.non-codegen-tests-linux-aarch64.result }}" = "success"
          test "${{ needs.web-tests-macos-aarch64.result }}" = "success"
          test "${{ needs.web-tests-linux-x86_64.result }}" = "success"
          test "${{ needs.web-tests-linux-aarch64.result }}" = "success"
          test "${{ needs.codegen-tests-macos-aarch64.result }}" = "success"
          test "${{ needs.codegen-tests-linux-x86_64.result }}" = "success"
          test "${{ needs.codegen-tests-linux-aarch64.result }}" = "success"
          test "${{ needs.image-api-sync.result }}" = "success"
          test "${{ needs.builtins-docs-sync.result }}" = "success"

  benchmark:
    name: Benchmark Suite
    runs-on: macos-14  # Apple Silicon runner
    # The benchmark suite does a full release build and only tracks trends, so it
    # runs on pushes to main rather than on every pull request.
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install native benchmark dependencies
        run: brew install pcre2

      - name: Build release binary
        run: cargo build --release

      - name: Run benchmark suite
        run: python3 scripts/benchmark_suite.py --iterations 3 --warmup 1 --json benchmark-results.json --markdown benchmark-results.md

      - name: Run magician benchmark suite
        run: python3 scripts/benchmark_magician.py --iterations 3 --warmup 1 --json magician-benchmark-results.json --markdown magician-benchmark-results.md

      - name: Publish benchmark summary
        run: |
          cat benchmark-results.md >> "$GITHUB_STEP_SUMMARY"
          printf '\n## Magician eval benchmark suite\n\n' >> "$GITHUB_STEP_SUMMARY"
          cat magician-benchmark-results.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark-results.json
            benchmark-results.md
            magician-benchmark-results.json
            magician-benchmark-results.md
