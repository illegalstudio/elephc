name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: macos-14  # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check (no warnings)
        run: cargo build 2>&1 | grep -v "^$" | grep -i warning && exit 1 || true

      - name: Run tests
        run: cargo test
