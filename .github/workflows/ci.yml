name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: macos-14  # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install native test dependencies
        run: brew install pcre2

      - name: Check (no warnings)
        run: cargo build 2>&1 | grep -v "^$" | grep -i warning && exit 1 || true

      - name: Build TLS staticlib
        # The codegen test runner links compiled https:// / TLS programs against
        # libelephc_tls.a, which `cargo test` does not produce on its own (the
        # crate is pulled in as an rlib dev-dependency, not the staticlib the
        # external linker needs). Build it explicitly first.
        run: cargo build -p elephc-tls

      - name: Run tests
        run: cargo test

  benchmark:
    name: Benchmark Suite
    runs-on: macos-14  # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install native benchmark dependencies
        run: brew install pcre2

      - name: Build release binary
        run: cargo build --release

      - name: Run benchmark suite
        run: python3 scripts/benchmark_suite.py --iterations 3 --warmup 1 --json benchmark-results.json --markdown benchmark-results.md

      - name: Publish benchmark summary
        run: cat benchmark-results.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark-results.json
            benchmark-results.md
