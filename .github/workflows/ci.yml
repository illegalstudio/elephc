name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs for the same ref (e.g. when a branch is force-pushed or
# rebased) so stale jobs stop consuming runners the moment a newer commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  BRIDGE_CRATES: >-
    -p elephc-tls
    -p elephc-pdo
    -p elephc-crypto
    -p elephc-phar
    -p elephc-tz
    -p elephc-image
    -p elephc-magician
    -p elephc-web
  # Windows parity prebuild set: the bridges that cross-build cleanly for
  # x86_64-pc-windows-gnu. elephc-phar is pure-Rust (bzip2 backed by
  # libbz2-rs-sys, zlib backed by miniz_oxide -- no system libbz2/zlib
  # dependency), so it needs no C toolchain support beyond MinGW. elephc-tls's
  # `ring` crypto backend also builds cleanly under the provisioned MinGW CC;
  # its fd-attachment surface uses a full-width Winsock SOCKET and duplicates
  # it through `TcpStream::try_clone` on Windows. Building this set remains a
  # structural bridge check; native behavior is covered separately below.
  BRIDGE_CRATES_WINDOWS: >-
    -p elephc-image
    -p elephc-pdo
    -p elephc-crypto
    -p elephc-tz
    -p elephc-phar
    -p elephc-tls
    -p elephc-web

jobs:
  # Compile each platform once, then let that platform's tests start as soon as
  # its archive is uploaded. This avoids a matrix-wide barrier where Linux tests
  # wait for a queued or slower macOS archive job.
  build-archive-macos-aarch64:
    name: Build & Archive Tests (macos-aarch64)
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build state
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: rust-macos-aarch64-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            rust-macos-aarch64-

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Install native test dependencies
        run: brew install pcre2

      - name: Check (no warnings)
        shell: bash
        run: |
          set -o pipefail
          cargo build 2>&1 | tee "$RUNNER_TEMP/cargo-build.log"
          ! grep -i warning "$RUNNER_TEMP/cargo-build.log"

      - name: Build bridge/native support crates
        # The codegen test runner links compiled programs against bridge
        # staticlibs: libelephc_tls.a (https:// / TLS), libelephc_pdo.a (PDO),
        # libelephc_crypto.a (hash / HMAC family), libelephc_phar.a (PHAR),
        # libelephc_tz.a (DateTimeZone introspection), libelephc_image.a
        # (GD / Exif / Imagick / Gmagick / Cairo), libelephc_magician.a (eval),
        # and libelephc_web.a. Build
        # them before archiving so the archive can capture the .a files (see the
        # archive include list in .config/nextest.toml).
        run: cargo build $BRIDGE_CRATES

      - name: Archive test binaries
        run: cargo nextest archive --profile ci --archive-file "$RUNNER_TEMP/nextest-archive.tar.zst"

      - name: Run doctests
        # Doctests cannot run from a nextest archive, so run them here where the
        # workspace is already built.
        run: cargo test --workspace --doc

      - name: Upload test archive
        uses: actions/upload-artifact@v4
        with:
          name: nextest-archive-macos-aarch64
          path: ${{ runner.temp }}/nextest-archive.tar.zst
          retention-days: 1
          if-no-files-found: error

  build-archive-linux-x86_64:
    name: Build & Archive Tests (linux-x86_64)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    # Every Linux job runs inside the prebuilt CI image (multi-arch, built by
    # ci-image.yml from .github/docker/ci.Dockerfile): the native deps, the
    # pinned Rust toolchain, and cargo-nextest are baked in, replacing the
    # per-job apt-get/rustup/nextest install steps that cost ~150s per job on
    # the arm runners.
    container:
      image: ghcr.io/illegalstudio/elephc-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust build state
        uses: actions/cache@v4
        with:
          # The toolchain lives at /usr/local/cargo (CARGO_HOME) inside the CI
          # image, not under $HOME.
          path: |
            /usr/local/cargo/git
            /usr/local/cargo/registry
            target
          key: rust-container-linux-x86_64-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            rust-container-linux-x86_64-

      - name: Check (no warnings)
        shell: bash
        run: |
          set -o pipefail
          cargo build 2>&1 | tee "$RUNNER_TEMP/cargo-build.log"
          ! grep -i warning "$RUNNER_TEMP/cargo-build.log"

      - name: Build bridge/native support crates
        # The codegen test runner links compiled programs against bridge
        # staticlibs: libelephc_tls.a (https:// / TLS), libelephc_pdo.a (PDO),
        # libelephc_crypto.a (hash / HMAC family), libelephc_phar.a (PHAR),
        # libelephc_tz.a (DateTimeZone introspection), libelephc_image.a
        # (GD / Exif / Imagick / Gmagick / Cairo), libelephc_magician.a (eval),
        # and libelephc_web.a. Build
        # them before archiving so the archive can capture the .a files (see the
        # archive include list in .config/nextest.toml).
        run: cargo build $BRIDGE_CRATES

      - name: Archive test binaries
        run: cargo nextest archive --profile ci --archive-file "$RUNNER_TEMP/nextest-archive.tar.zst"

      - name: Run doctests
        # Doctests cannot run from a nextest archive, so run them here where the
        # workspace is already built.
        run: cargo test --workspace --doc

      - name: Upload test archive
        uses: actions/upload-artifact@v4
        with:
          name: nextest-archive-linux-x86_64
          path: ${{ runner.temp }}/nextest-archive.tar.zst
          retention-days: 1
          if-no-files-found: error

  build-archive-linux-aarch64:
    name: Build & Archive Tests (linux-aarch64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    container:
      image: ghcr.io/illegalstudio/elephc-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust build state
        uses: actions/cache@v4
        with:
          # The toolchain lives at /usr/local/cargo (CARGO_HOME) inside the CI
          # image, not under $HOME.
          path: |
            /usr/local/cargo/git
            /usr/local/cargo/registry
            target
          key: rust-container-linux-aarch64-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            rust-container-linux-aarch64-

      - name: Check (no warnings)
        shell: bash
        run: |
          set -o pipefail
          cargo build 2>&1 | tee "$RUNNER_TEMP/cargo-build.log"
          ! grep -i warning "$RUNNER_TEMP/cargo-build.log"

      - name: Build bridge/native support crates
        # The codegen test runner links compiled programs against bridge
        # staticlibs: libelephc_tls.a (https:// / TLS), libelephc_pdo.a (PDO),
        # libelephc_crypto.a (hash / HMAC family), libelephc_phar.a (PHAR),
        # libelephc_tz.a (DateTimeZone introspection), libelephc_image.a
        # (GD / Exif / Imagick / Gmagick / Cairo), libelephc_magician.a (eval),
        # and libelephc_web.a. Build
        # them before archiving so the archive can capture the .a files (see the
        # archive include list in .config/nextest.toml).
        run: cargo build $BRIDGE_CRATES

      - name: Archive test binaries
        run: cargo nextest archive --profile ci --archive-file "$RUNNER_TEMP/nextest-archive.tar.zst"

      - name: Run doctests
        # Doctests cannot run from a nextest archive, so run them here where the
        # workspace is already built.
        run: cargo test --workspace --doc

      - name: Upload test archive
        uses: actions/upload-artifact@v4
        with:
          name: nextest-archive-linux-aarch64
          path: ${{ runner.temp }}/nextest-archive.tar.zst
          retention-days: 1
          if-no-files-found: error

  non-codegen-tests-macos-aarch64:
    name: Non-Codegen Tests (macos-aarch64)
    needs: build-archive-macos-aarch64
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Install native test dependencies
        run: brew install pcre2

      - name: Download test archive
        uses: actions/download-artifact@v4
        with:
          name: nextest-archive-macos-aarch64
          path: ${{ runner.temp }}

      - name: Run non-codegen tests
        run: |
          cargo nextest run --profile ci \
            --archive-file "$RUNNER_TEMP/nextest-archive.tar.zst" \
            --workspace-remap . \
            -E 'not binary(codegen_tests) and not binary(web_tests) and not binary(web_session_tests)' \
            --no-fail-fast --retries 1 --flaky-result pass \
            -j 1

  non-codegen-tests-linux-x86_64:
    name: Non-Codegen Tests (linux-x86_64)
    needs: build-archive-linux-x86_64
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    container:
      image: ghcr.io/illegalstudio/elephc-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Download test archive
        uses: actions/download-artifact@v4
        with:
          name: nextest-archive-linux-x86_64
          path: ${{ runner.temp }}

      - name: Run non-codegen tests
        run: |
          cargo nextest run --profile ci \
            --archive-file "$RUNNER_TEMP/nextest-archive.tar.zst" \
            --workspace-remap . \
            -E 'not binary(codegen_tests) and not binary(web_tests) and not binary(web_session_tests)' \
            --no-fail-fast --retries 1 --flaky-result pass \
            -j 1

  non-codegen-tests-linux-aarch64:
    name: Non-Codegen Tests (linux-aarch64)
    needs: build-archive-linux-aarch64
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    container:
      image: ghcr.io/illegalstudio/elephc-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
