name: Release

on:
  # Use create instead of push tags so commit-message skip directives do not
  # suppress the release gate before it can verify the tagged commit.
  create:

permissions:
  contents: write
  checks: read

jobs:
  verify-ci:
    name: Verify CI for tagged commit
    if: github.event.ref_type == 'tag' && startsWith(github.event.ref, 'v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Resolve tagged commit
        id: tag
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          SHA="$(git rev-list -n 1 "$GITHUB_REF")"
          echo "name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Require tag on main
        env:
          SHA: ${{ steps.tag.outputs.sha }}
        run: |
          git fetch origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$SHA" origin/main; then
            echo "::error::Tag ${GITHUB_REF_NAME} points to ${SHA}, which is not reachable from origin/main."
            exit 1
          fi

      - name: Require green Build & Test check
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ steps.tag.outputs.sha }}
        run: |
          RESULT="$(gh api \
            "/repos/${GITHUB_REPOSITORY}/commits/${SHA}/check-runs?check_name=Build%20%26%20Test&status=completed&filter=latest" \
            --jq '.check_runs | map(select(.app.slug == "github-actions" and .conclusion == "success")) | first // {} | [(.conclusion // ""), (.html_url // "")] | @tsv')"
          CONCLUSION="$(printf '%s' "$RESULT" | cut -f1)"
          CHECK_URL="$(printf '%s' "$RESULT" | cut -f2)"

          if [ "$CONCLUSION" != "success" ]; then
            echo "::error::Tagged commit ${SHA} does not have a successful Build & Test check."
            exit 1
          fi

          echo "Found successful Build & Test check: ${CHECK_URL}"

  build:
    name: Build macOS ARM64
    if: github.event.ref_type == 'tag' && startsWith(github.event.ref, 'v')
    runs-on: macos-14  # Apple Silicon runner
    needs:
      - verify-ci
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set version from tag and commit
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          export VERSION
          python3 - <<'PY'
          from pathlib import Path
          import os
          import re

          version = os.environ["VERSION"]

          cargo_toml = Path("Cargo.toml")
          cargo_toml.write_text(
              re.sub(
                  r'^version = ".*"$',
                  f'version = "{version}"',
                  cargo_toml.read_text(),
                  count=1,
                  flags=re.MULTILINE,
              )
          )

          cargo_lock = Path("Cargo.lock")
          cargo_lock.write_text(
              re.sub(
                  r'(\[\[package\]\]\nname = "elephc"\nversion = ")[^"]+(")',
                  rf'\g<1>{version}\2',
                  cargo_lock.read_text(),
                  count=1,
              )
          )
          PY
          echo "Set Cargo.toml and Cargo.lock version to ${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump version to ${VERSION}" || true
          git push origin HEAD:main

      - name: Build release binary
        run: cargo build --release

      - name: Build release bridge staticlibs
        run: cargo build --release -p elephc-tls -p elephc-pdo -p elephc-crypto -p elephc-phar -p elephc-tz

      - name: Strip binary
        run: strip target/release/elephc

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Create tarball
        run: |
          cd target/release
          tar czf elephc-${{ steps.version.outputs.version }}-aarch64-apple-darwin.tar.gz \
            elephc \
            libelephc_tls.a \
            libelephc_pdo.a \
            libelephc_crypto.a \
            libelephc_phar.a \
            libelephc_tz.a
          shasum -a 256 elephc-${{ steps.version.outputs.version }}-aarch64-apple-darwin.tar.gz > elephc-${{ steps.version.outputs.version }}-aarch64-apple-darwin.tar.gz.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            target/release/elephc-${{ steps.version.outputs.version }}-aarch64-apple-darwin.tar.gz
            target/release/elephc-${{ steps.version.outputs.version }}-aarch64-apple-darwin.tar.gz.sha256

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_NUM="${VERSION#v}"
          TARBALL="elephc-${VERSION}-aarch64-apple-darwin.tar.gz"
          SHA256=$(cat target/release/${TARBALL}.sha256 | awk '{print $1}')
          URL="https://github.com/illegalstudio/elephc/releases/download/${VERSION}/${TARBALL}"

          # Clone tap repo
          git clone https://x-access-token:${TAP_TOKEN}@github.com/illegalstudio/homebrew-tap.git /tmp/homebrew-tap
          mkdir -p /tmp/homebrew-tap/Formula

          # Generate formula
          cat > /tmp/homebrew-tap/Formula/elephc.rb <<EOF
          class Elephc < Formula
            desc "PHP-to-native compiler targeting macOS ARM64"
            homepage "https://github.com/illegalstudio/elephc"
            url "$URL"
            sha256 "$SHA256"
            version "$VERSION_NUM"
            license "MIT"

            depends_on :macos
            depends_on :arch => :arm64

            def install
              bin.install "elephc"
              lib.install "libelephc_tls.a"
              lib.install "libelephc_pdo.a"
              lib.install "libelephc_crypto.a"
              lib.install "libelephc_phar.a"
              lib.install "libelephc_tz.a"
            end

            test do
              (testpath/"hello.php").write('<?php echo "hello";')
              system bin/"elephc", "hello.php"
              assert_equal "hello", shell_output("#{testpath}/hello")

              # Exercise the TLS bridge (https wrapper).
              (testpath/"https.php").write('<?php \$h = fopen("https://example.com/", "r"); echo is_resource(\$h);')
              system bin/"elephc", "https.php"
              assert_predicate testpath/"https", :exist?

              # Exercise the PDO bridge (SQLite driver is bundled; no external
              # DB client or server required). This also validates that
              # libelephc_pdo.a is discoverable in the Homebrew lib/ layout.
              (testpath/"pdo.php").write('<?php \$db = new PDO("sqlite::memory:"); \$db->exec("CREATE TABLE t(id INTEGER)"); echo "pdo-ok";')
              system bin/"elephc", "pdo.php"
              assert_equal "pdo-ok", shell_output("#{testpath}/pdo")

              # Exercise the crypto bridge used by hash()/hash_hmac().
              (testpath/"hash.php").write('<?php echo hash("sha256", "abc");')
              system bin/"elephc", "hash.php"
              assert_equal "ba7816bf8f01cfea414140de5dae2223b00361a396177a9cb410ff61f20015ad", shell_output("#{testpath}/hash")

              # Exercise the PHAR bridge from the Homebrew lib/ layout.
              (testpath/"phar.php").write('<?php file_put_contents("phar://brew.phar/entry.txt", "phar-ok"); \$p = "brew.phar"; echo file_get_contents("phar://" . \$p . "/entry.txt");')
              system bin/"elephc", "phar.php"
              assert_equal "phar-ok", shell_output("#{testpath}/phar")

              # Exercise the timezone-database bridge (DateTimeZone introspection)
              # from the Homebrew lib/ layout; getLocation() reads libelephc_tz.a.
              (testpath/"tz.php").write('<?php echo (new DateTimeZone("Europe/Rome"))->getLocation()["country_code"];')
              system bin/"elephc", "tz.php"
              assert_equal "IT", shell_output("#{testpath}/tz")
            end
          end
          EOF

          # Push to tap
          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/elephc.rb
          git commit -m "Update elephc to ${VERSION}"
          git push
